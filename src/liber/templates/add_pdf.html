{% extends "base.html" %}
{% block title %}Add PDF — {{ paper.citation_key }} — liber{% endblock %}

{% block content %}
<div class="page-header">
  <h1>Add PDF</h1>
  <a class="btn btn-secondary" href="{{ url_for('paper_detail', citation_key=paper.citation_key) }}">← Back</a>
</div>

<div class="card">
  <p style="color:#64748b;font-size:.9rem;margin-bottom:1rem;">
    Add a PDF for <strong>{{ paper.title }}</strong> (<span class="key-badge">{{ paper.citation_key }}</span>).
    You can select a file or provide a URL.
  </p>
  <form method="post" enctype="multipart/form-data">
    <div class="form-group">
      <label for="pdf">PDF file <span style="color:#94a3b8;font-weight:400;">(optional if you provide a URL below)</span></label>
      <input type="file" id="pdf" name="pdf" accept=".pdf">
    </div>
    <div class="form-group">
      <label for="pdf_url">Or provide a URL to the PDF <span style="color:#94a3b8;font-weight:400;">(used only when no file is selected above)</span></label>
      <input type="text" id="pdf_url" name="pdf_url" placeholder="https://example.com/paper.pdf">
    </div>
    <button type="submit" class="btn btn-primary">Add PDF</button>
  </form>
</div>
{% endblock %}
