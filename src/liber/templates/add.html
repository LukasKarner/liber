{% extends "base.html" %}
{% block title %}Add Paper — liber{% endblock %}

{% block content %}
<div class="page-header">
  <h1>Add Paper</h1>
  <a class="btn btn-secondary" href="{{ url_for('index') }}">← Back</a>
</div>

<div class="card">
  <form method="post" enctype="multipart/form-data">
    <div class="form-group">
      <label for="pdf">PDF file <span style="color:#dc2626">*</span></label>
      <input type="file" id="pdf" name="pdf" accept=".pdf" required>
    </div>
    <div class="form-group">
      <label for="bib">BibTeX file (.bib) <span style="color:#dc2626">*</span></label>
      <input type="file" id="bib" name="bib" accept=".bib" required>
    </div>
    <div class="form-group">
      <label for="key">Citation key <span style="color:#94a3b8;font-weight:400;">(optional — auto-generated from bib if blank)</span></label>
      <input type="text" id="key" name="key" placeholder="e.g. vaswani2017attention">
    </div>
    <button type="submit" class="btn btn-primary">Add Paper</button>
  </form>
</div>
{% endblock %}
